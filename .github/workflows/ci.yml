name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            firebase-functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Format check, lint, test, build (root)
        run: npm run format:check && npm run lint && npm run test && npm run build

      - name: Install firebase-functions dependencies
        working-directory: firebase-functions
        run: npm ci

      - name: Lint, test, build (firebase-functions)
        working-directory: firebase-functions
        run: npm run lint && npm test && npm run build

  # Cloudflare Pages Git can still fail with an internal error after reading Wrangler
  # config; deploy-pages uploads ./dist via the Pages API (wrangler pages deploy).
  #
  # Optional: Pages → Settings → Builds → disable duplicate Git production builds
  # if this workflow is the only deploy path you want.
  deploy-pages:
    needs: verify
    if: >-
      github.repository == 'GMUNextGen5/LMS-Church-App' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build (production Vite env)
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: lms-church-app
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
