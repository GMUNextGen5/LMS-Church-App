# Optional local Cloudflare Pages / Wrangler development only.
#
# Copy to `wrangler.toml` in the repo root (that filename is gitignored).
# Do not commit `wrangler.toml`: Cloudflare Pages Git builds use a BETA Wrangler
# reader that can fail with an internal error after validating a committed file
# that sets `pages_build_output_dir`, before `npm install` runs.
#
# Production deploys: use Cloudflare dashboard build settings and/or the
# `deploy-pages` job in `.github/workflows/ci.yml`.

name = "lms-church-app"
pages_build_output_dir = "./dist"
compatibility_date = "2026-04-16"
