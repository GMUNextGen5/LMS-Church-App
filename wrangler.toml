# Cloudflare Pages configuration for the LMS frontend.
#
# Background: Cloudflare Pages' "v2 root directory strategy" currently runs a
# BETA pre-build step that checks for a Wrangler configuration file. When no
# configuration file is present that BETA path can hit an "internal error"
# before npm install runs. Providing an explicit, minimal Pages configuration
# gives the v2 strategy a deterministic config to follow and avoids that path.
#
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# - pages_build_output_dir: directory produced by `npm run build` (Vite default)
# - compatibility_date: locks the Workers runtime compatibility for any Pages
#   Functions added later. We don't ship Pages Functions today, but this is
#   required by the schema.
#
# The `name` field must match the Cloudflare Pages project name in the
# dashboard. Pages requires it at the top level because environments (prod,
# preview, branch) all target the same project, and the validator fails
# configuration loading without it.

name = "lms-church-app"
pages_build_output_dir = "./dist"
compatibility_date = "2026-04-16"
